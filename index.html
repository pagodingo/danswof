    ['display-ne-canvas-w-img']() {

      // <textarea style="width: 100%; display: inline-block; border: 1px solid #222; margin: 0px" class="text">


      // change me to change grid height and width
      const canvas = document.getElementById('grid');
      canvas.width = 2048
      canvas.height = 2048
      const ctx = canvas.getContext('2d');


      const cellSize = 16;
      const rows = canvas.height / cellSize;
      const cols = canvas.width / cellSize;

      const imageSources = [
        // './dan.jpeg',
        // './cur.jpeg',
        // './poi.jpeg',
        // './dan2.jpeg'
      ];

      const images = [];
      let imagesLoaded = 0;
      let hoverTile = null;
      let offsetX = 0;
      let offsetY = 0;
      let isDragging = false;
      let lastX, lastY;

      // store which image is drawn in each tile
      const gridData = Array.from({ length: rows }, () => Array(cols).fill(null));
      // preload images
      function loadImages(callback) {
        for (let src of imageSources) {
          const img = new Image();
          img.src = src;
          img.onload = () => {
            imagesLoaded++;
            if (imagesLoaded === imageSources.length) callback();
          };
          images.push(img);
        }
      }

      // draw grid and store images in gridData
      function drawGrid() {
        // for (let row = 0; row < rows; row++) {
        //   for (let col = 0; col < cols; col++) {
        //     if (Math.random() < 0.3) {
        //       const img = images[Math.floor(Math.random() * images.length)];
        //       gridData[row][col] = img;
        //       ctx.drawImage(img, col * cellSize, row * cellSize, cellSize, cellSize);
        //     } else {
        //       gridData[row][col] = null;
        //     }
        //   }
        // }
        drawGridLines();
        redraw();
      }

      // draw grid lines
      function drawGridLines() {
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1;
        for (let x = 0; x <= cols; x++) {
          const xpos = x * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(xpos, 0);
          ctx.lineTo(xpos, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= rows; y++) {
          const ypos = y * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(0, ypos);
          ctx.lineTo(canvas.width, ypos);
          ctx.stroke();
        }
      }

      // redraw everything including hover border
      function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const img = gridData[row][col];
            if (img) {
              ctx.drawImage(img, col * cellSize, row * cellSize, cellSize, cellSize);
            }
          }
        }

        drawGridLines();

        // draw hover border
        if (hoverTile) {
          const { row, col } = hoverTile;
          if (isDragging) {
            var img = images[Math.floor(Math.random() * images.length)];
            gridData[row][col] = img;
          }

          ctx.save();
          ctx.strokeStyle = '#bbb';
          ctx.lineWidth = 3;
          ctx.strokeRect(col * cellSize + 1.5, row * cellSize + 1.5, cellSize - 3, cellSize - 3);
          ctx.restore();
        }
      }

      // click logging
      function getTileAtClick(event) {
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left + offsetX;
        const y = event.clientY - rect.top + offsetY;

        const col = Math.floor(x / cellSize);
        const row = Math.floor(y / cellSize);

        // assign new image to gridData
        // const img = images[Math.floor(Math.random() * images.length)];
        // gridData[row][col] = img;

        // redraw everything
        // redraw();

        ctx.fillStyle = "#fff"
        ctx.fillRect(col * cellSize + 1.5, row * cellSize + 1.5, cellSize - 3, cellSize - 3)

        console.log(`Tile: row ${row}, col ${col}`);
        // window.wof['add-new'](JSON.stringify(gridData))
      }

      canvas.addEventListener('click', getTileAtClick);

      // mouse move: hover detection and drag
      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left + offsetX;
        const y = e.clientY - rect.top + offsetY;
        const col = Math.floor(x / cellSize);
        const row = Math.floor(y / cellSize);

        if (col >= 0 && col < cols && row >= 0 && row < rows) {
          hoverTile = { row, col };
        } else {
          hoverTile = null;
        }

      });
      redraw();

      // drag start/end
      canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
      });
      canvas.addEventListener('mouseup', () => { isDragging = false; });

      // initialize
      loadImages(drawGrid);
    }

    ['img-board']() {
      // const divider = document.querySelector('.divider');
      const left = document.querySelector('.left');
      const main = document.querySelector('.main');

      let isDragging = false;

      // divider.addEventListener('mousedown', e => {
      //   isDragging = true;
      //   document.body.style.cursor = 'col-resize';
      //   e.preventDefault();
      // });

      window.addEventListener('mouseup', () => {
        isDragging = false;
        document.body.style.cursor = '';
      });

      window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const mainRect = main.getBoundingClientRect();
        const newWidth = e.clientX - mainRect.left;
        const minWidth = 318;
        const maxWidth = mainRect.width - 320; // keep some space for right panel

        if (newWidth > minWidth && newWidth < maxWidth) {
          left.style.flex = `0 0 ${newWidth}px`;
        }
      });

      (function () {
        const canvas = document.getElementById('canvas');
        // const fileInput = document.getElementById('fileInput');
        // const addFileBtn = document.getElementById('addFileBtn');
        // const fitBtn = document.getElementById('fitBtn');
        let zCounter = 1;

        // Utility: keep items within canvas boundary 
        function clampToCanvas(item) {
          const canvasRect = canvas.getBoundingClientRect();
          const itemRect = item.getBoundingClientRect();

          let left = parseFloat(item.style.left);
          let top = parseFloat(item.style.top);
          let width = itemRect.width;
          let height = itemRect.height;

          // Clamp position
          if (left < 0) left = 0;
          if (top < 0) top = 0;
          if (left + width > canvasRect.width) left = canvasRect.width - width;
          if (top + height > canvasRect.height) top = canvasRect.height - height;

          item.style.left = left + 'px';
          item.style.top = top + 'px';
        }
        // Utility: convert https:// or http urls to base64 strings
        function urlContentToDataUri(url) {
          return fetch(url)
            .then(response => response.blob())
            .then(blob => new Promise((callback) => {
              const reader = new FileReader();
              reader.onload = function () {
                callback(this.result);
              };
              reader.readAsDataURL(blob);
            }));
        }

        // Utility: create an image item on canvas
        function addImageElement(blobOrUrl, x = 50, y = 50) {
          const item = document.createElement('div');
          item.className = 'image-item';
          item.style.left = x + 'px';
          item.style.top = y + 'px';
          item.style.width = '240px';
          item.style.height = '160px';
          item.style.zIndex = ++zCounter;

          const img = document.createElement('img');
          img.draggable = false;
          if (blobOrUrl instanceof Blob) {
            img.src = URL.createObjectURL(blobOrUrl);
            item._objectURL = img.src;
            img._file = blobOrUrl
            console.log('blubber')
          } else {
            console.log('blub')
            img.src = blobOrUrl;
            // item._objectURL = img.src;
            // img._file = blobOrUrl
          }

          item.appendChild(img);

          // add 4 resize handles
          ['nw', 'ne', 'sw', 'se'].forEach(pos => {
            const h = document.createElement('div');
            h.className = 'handle ' + pos;
            item.appendChild(h);
          });

          canvas.appendChild(item);

          // --- drag move ---
          let startX = 0, startY = 0, origX = 0, origY = 0, dragging = false;
          item.addEventListener('pointerdown', e => {
            if (e.target.classList.contains('handle')) return; // skip if on handle
            e.preventDefault();
            item.setPointerCapture(e.pointerId);
            dragging = true;
            startX = e.clientX; startY = e.clientY;
            origX = parseFloat(item.style.left); origY = parseFloat(item.style.top);
            item.style.zIndex = ++zCounter;
            item.style.cursor = 'grabbing';
          });
          item.addEventListener('pointermove', e => {
            if (!dragging) return;
            const dx = e.clientX - startX, dy = e.clientY - startY;
            item.style.left = (origX + dx) + 'px';
            item.style.top = (origY + dy) + 'px';
            clampToCanvas(item);
          });
          item.addEventListener('pointerup', e => {
            dragging = false; item.style.cursor = 'grab';
            try { item.releasePointerCapture(e.pointerId); } catch { }
          });

          // --- resize via handles ---
          const handles = item.querySelectorAll('.handle');
          handles.forEach(h => {
            let startW, startH, startL, startT, sx, sy;
            h.addEventListener('pointerdown', e => {
              e.stopPropagation(); e.preventDefault();
              item.setPointerCapture(e.pointerId);
              sx = e.clientX; sy = e.clientY;
              startW = item.offsetWidth; startH = item.offsetHeight;
              startL = parseFloat(item.style.left); startT = parseFloat(item.style.top);
              const pos = [...h.classList].find(c => ['nw', 'ne', 'sw', 'se'].includes(c));
              function move(ev) {
                let dx = ev.clientX - sx, dy = ev.clientY - sy;
                if (pos === 'se') { item.style.width = (startW + dx) + 'px'; item.style.height = (startH + dy) + 'px'; }
                if (pos === 'sw') { item.style.width = (startW - dx) + 'px'; item.style.height = (startH + dy) + 'px'; item.style.left = (startL + dx) + 'px'; }
                if (pos === 'ne') { item.style.width = (startW + dx) + 'px'; item.style.height = (startH - dy) + 'px'; item.style.top = (startT + dy) + 'px'; }
                if (pos === 'nw') { item.style.width = (startW - dx) + 'px'; item.style.height = (startH - dy) + 'px'; item.style.left = (startL + dx) + 'px'; item.style.top = (startT + dy) + 'px'; }
                // <-- clamp after resize
                clampToCanvas(item);

              }
              function up(ev) {
                item.removeEventListener('pointermove', move);
                item.removeEventListener('pointerup', up);
              }
              item.addEventListener('pointermove', move);
              item.addEventListener('pointerup', up);
            });
          });

          // double-click to remove
          item.addEventListener('dblclick', () => {
            if (item._objectURL) URL.revokeObjectURL(item._objectURL);
            item.remove();
          });

          return item;
        }

        window.addEventListener('paste', async (e) => {
          const items = e.clipboardData && e.clipboardData.items;
          if (!items) return;

          const rect = canvas.getBoundingClientRect();
          const centerX = window.scrollX + rect.left + rect.width / 2 - canvas.offsetLeft;
          const centerY = window.scrollY + rect.top + rect.height / 2 - canvas.offsetTop;

          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" style="max-width:100%">')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
          .replace(/^(\d+)\. (.+)$/gm, '<li data-ol>$2</li>')
          .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
          .replace(/(<li data-ol>[\s\S]*?<\/li>)/g, '<ol>$1</ol>')
          .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
          .replace(/\|(.+)\|/g, row => '<tr>' + row.split('|').filter((_, i, a) => i > 0 && i < a.length - 1).map(c => '<td>' + c.trim() + '</td>').join('') + '</tr>')
          .replace(/(<tr>[\s\S]+<\/tr>)/g, '<table>$1</table>')
          .replace(/^(?!<[h|b|u|o|p|t|c|i])(.*\S.*)$/gm, '<p>$1</p>')
          .replace(/\n{2,}/g, '');
      }

      function render() {
        preview.innerHTML = md(editor.value);
        const words = editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0;
        // wc.textContent = words + ' word' + (words !== 1 ? 's' : '');
      }

      function wrap(before, after) {
        const s = editor.selectionStart, e = editor.selectionEnd;
        const sel = editor.value.slice(s, e) || 'text';
        editor.value = editor.value.slice(0, s) + before + sel + after + editor.value.slice(e);
        editor.focus();
        editor.setSelectionRange(s + before.length, s + before.length + sel.length);
        render();
      }

      function insertLine(prefix) {
        const s = editor.selectionStart;
        const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
        editor.value = editor.value.slice(0, lineStart) + prefix + editor.value.slice(lineStart);
        editor.focus();
        render();
      }

      function insertLink() {
        const url = prompt('URL:', 'https://');
        if (url) wrap('[', '](' + url + ')');
      }

      function saveFile() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.value], { type: 'text/markdown' }));
        a.download = 'document.md';
        a.click();
      }

      function loadFile() { document.getElementById('snarky-puppy-file-input').click(); }

      function readFile(e) {
        const reader = new FileReader();
        reader.onload = ev => { editor.value = ev.target.result; render(); };
        reader.readAsText(e.target.files[0]);
      }

      editor.addEventListener('input', render);
      editor.addEventListener('keydown', e => {
        if (e.key === 'Tab') {
          e.preventDefault();
          const s = editor.selectionStart;
          editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(s);
          editor.selectionStart = editor.selectionEnd = s + 2;
        }
      });

      editor.value = `# Welcome\n\nStart writing **markdown** here.\n\n- Live preview on the right\n- Use the toolbar or type directly\n- Click **save** to download as .md\n`;
      render();
    }

    async ['add-img-listeners']() {
      // --- image items ---
      const items = Array.from(document.querySelectorAll('.image-item'))

      items.forEach(item => {

        // --- drag move ---
        let startX = 0, startY = 0, origX = 0, origY = 0, dragging = false;
        item.addEventListener('pointerdown', e => {
          if (e.target.classList.contains('handle')) return; // skip if on handle
          e.preventDefault();
          item.setPointerCapture(e.pointerId);
          dragging = true;
          startX = e.clientX; startY = e.clientY;
          origX = parseFloat(item.style.left); origY = parseFloat(item.style.top);
          item.style.zIndex = ++zCounter;
          item.style.cursor = 'grabbing';
        });
        item.addEventListener('pointermove', e => {
          if (!dragging) return;
          const dx = e.clientX - startX, dy = e.clientY - startY;
          item.style.left = (origX + dx) + 'px';
          item.style.top = (origY + dy) + 'px';
          // clampToCanvas(item);
        });
        item.addEventListener('pointerup', e => {
          dragging = false; item.style.cursor = 'grab';
          try { item.releasePointerCapture(e.pointerId); } catch { }
        });

        // --- resize via handles ---
        const handles = item.querySelectorAll('.handle');
        handles.forEach(h => {
          let startW, startH, startL, startT, sx, sy;
          h.addEventListener('pointerdown', e => {
            e.stopPropagation(); e.preventDefault();
            item.setPointerCapture(e.pointerId);
            sx = e.clientX; sy = e.clientY;
            startW = item.offsetWidth; startH = item.offsetHeight;
            startL = parseFloat(item.style.left); startT = parseFloat(item.style.top);
            const pos = [...h.classList].find(c => ['nw', 'ne', 'sw', 'se'].includes(c));
            function move(ev) {
              let dx = ev.clientX - sx, dy = ev.clientY - sy;
              if (pos === 'se') { item.style.width = (startW + dx) + 'px'; item.style.height = (startH + dy) + 'px'; }
              if (pos === 'sw') { item.style.width = (startW - dx) + 'px'; item.style.height = (startH + dy) + 'px'; item.style.left = (startL + dx) + 'px'; }
              if (pos === 'ne') { item.style.width = (startW + dx) + 'px'; item.style.height = (startH - dy) + 'px'; item.style.top = (startT + dy) + 'px'; }
              if (pos === 'nw') { item.style.width = (startW - dx) + 'px'; item.style.height = (startH - dy) + 'px'; item.style.left = (startL + dx) + 'px'; item.style.top = (startT + dy) + 'px'; }
              // <-- clamp after resize
              // clampToCanvas(item);

            }
            function up(ev) {
              item.removeEventListener('pointermove', move);
              item.removeEventListener('pointerup', up);
            }
            item.addEventListener('pointermove', move);
            item.addEventListener('pointerup', up);
          });
        });

        // double-click to remove
        item.addEventListener('dblclick', () => {
          if (item._objectURL) URL.revokeObjectURL(item._objectURL);
          item.remove();
        });
      })
    }

    ['chip']() {
      const editor = document.querySelector('.app');

      // ── ID generator ──────────────────────────────────────────────────────────────
      let chipCounter = 0;
      function makeId() {
        chipCounter++;
        return 'chip-' + String(chipCounter).padStart(4, '0') + '-' + Math.random().toString(36).slice(2, 6);
      }

      // ── Create a locked chip from text + id ───────────────────────────────────────
      function makeChip(text, id) {
        const span = document.createElement('span');
        span.className = 'link-chip';
        span.contentEditable = 'false';
        span.dataset.chipId = id;
        span.title = 'ID: ' + id;
        span.textContent = text;
        // Show ID badge on click
        span.addEventListener('click', () => {
          confirm('<button>hello</button>Chip clicked — text: "' + text + '"  id: ' + id);
        });
        return span;
      }

      // ── Ctrl+V on selected text → wrap as chip ────────────────────────────────────
      editor.addEventListener('keydown', e => {
        // Only intercept Ctrl+V (or Cmd+V) when there is a non-collapsed selection
        if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
          const sel = window.getSelection();
          if (!sel || !sel.rangeCount) return;
          const range = sel.getRangeAt(0);
          if (range.collapsed) return; // nothing selected — let normal paste happen

          // Make sure selection is inside the editor
          if (!editor.contains(range.commonAncestorContainer)) return;

          e.preventDefault();

          const selectedText = range.toString().trim();
          if (!selectedText) return;

          const id = makeId();
          const chip = makeChip(selectedText, id);

          // Replace the selected content with the chip
          range.deleteContents();
          range.insertNode(chip);

          // Insert a zero-width space after so caret can sit beside chip
          const spacer = document.createTextNode('\u200b');
          range.setStartAfter(chip);
          range.insertNode(spacer);
          range.setStartAfter(spacer);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);

          // Log to info bar
          const box = document.getElementById('chip-info');
          box.textContent = 'Created chip — text: "' + selectedText + '"  id: ' + id;
          return;
        }

        // ── Block accidental deletion of chips ──────────────────────────────────────
        if (e.key !== 'Backspace' && e.key !== 'Delete') return;

        const sel = window.getSelection();
        if (!sel || !sel.rangeCount) return;
        const range = sel.getRangeAt(0);

        if (!range.collapsed) {
          const frag = range.cloneContents();
          if (frag.querySelector('.link-chip')) {
            e.preventDefault();
            // Delete only text nodes in the selection; leave chips intact
            const walker = document.createTreeWalker(range.commonAncestorContainer, NodeFilter.SHOW_ALL);
            const toBlank = [];
            let node = walker.nextNode();
            while (node) {
              if (range.intersectsNode(node) && node.nodeType === Node.TEXT_NODE
                && !node.parentNode?.classList?.contains('link-chip')) {
                toBlank.push(node);
              }
              node = walker.nextNode();
            }
            toBlank.forEach(n => n.textContent = '');
            range.collapse(true);
          }
          return;
        }

        // Collapsed — guard adjacent chips
        const { startContainer, startOffset } = range;
        if (e.key === 'Backspace' && !(startOffset > 0 && startContainer.nodeType === Node.TEXT_NODE)) {
          const ref = startContainer.nodeType === Node.TEXT_NODE
            ? startContainer : startContainer.childNodes[startOffset - 1];
          const prev = ref?.previousSibling ?? ref?.parentNode?.previousSibling;
          if (prev?.classList?.contains('link-chip')) { e.preventDefault(); return; }
        }
        if (e.key === 'Delete' && !(startContainer.nodeType === Node.TEXT_NODE && startOffset < startContainer.length)) {
          const ref = startContainer.nodeType === Node.TEXT_NODE
            ? startContainer : startContainer.childNodes[startOffset];
          const next = ref?.nextSibling ?? ref?.parentNode?.nextSibling;
          if (next?.classList?.contains('link-chip')) { e.preventDefault(); return; }
        }
      });
    }

    ['main'](e) {
      // ignore up/down arrows
      if ([38, 40].includes(e.keyCode)) return
      // ignore enter/go-to route
      if (e.key === 'Enter') {
        window.wof.prev = e.target.value
        window.wof['route'](e.target.value);
        return
      }

      // Removes the list if it's visible
      if (!document.getElementById('fileSearchBarInput').value) {
        if (document.querySelector('#list')) {
          document.querySelector('#list').remove()
        }
      }

      if (document.getElementById('list')) {
        document.getElementById('list').remove()

        // Create Results List
        let p = document.createElement('div')
        p.className = 'results'
        p.id = 'list'

        // Populate List
        for (var i = 0; i < window.wof.actions().length; ++i) {
          if (window.wof.actions()[i].toLowerCase().includes(document.getElementById('fileSearchBarInput').value.toLowerCase())) {
            p.innerHTML += `<div class="autocomplete-item" ${onclick}>${window.wof.actions()[i]}</div>`
          }
        }

        // Action Handler: Enables Arrow Key Movement
        window.wof['action-handler'](window.wof.self())
        document.getElementById('fileSearchBar').appendChild(p)

        // Grab List Elements?
        let arr = document.getElementsByClassName('autocomplete-item')

        // Make ations clickable
        for (var j = 0; j < arr.length; ++j) {
          arr[j].addEventListener('mousedown', (e) => {
            e.preventDefault()
            window.wof.route(e.target.innerText)
            return;
          })
        }
        // If there's no list
      } else {
        let p = document.createElement('div')
        p.className = 'results'
        p.id = 'list'
        document.getElementById('fileSearchBar').appendChild(p)
      }
    }

    ['action-handler'](action) {
      let i = -1,
        results = document.getElementsByClassName("autocomplete-item");

      function deselectAction() {
        let action = document.getElementsByClassName('result-selected')[0] || results[0]
        action.classList.remove("result-selected");
      }

      function selectAction(action) {
        if (action === results[results.length]) {
          deselectAction(); i = 0;
          return results[i].classList.add('result-selected');
        }

        let active = document.getElementsByClassName('result-selected');
        if (active) deselectAction();

        document.getElementById('fileSearchBarInput').value = action.innerText
        action.classList.add("result-selected")
      }

      action.addEventListener(
        "keydown", (e) => {

          if (![38, 40, 13].includes(e.keyCode)) return;

          if (results.length === 0) return;

          if (results.length === 1) {
            action.value = results[0].innerText
            selectAction(results[0])
            return;
          }

          if (e.keyCode === 40) {
            ++i; return selectAction(results[i]);
          }

          if (e.keyCode === 38 && i === 0) { i = results.length - 1; return selectAction(results[i]) }

          if (e.keyCode === 38) {
            --i; return selectAction(results[i]);
          }

          if (e.keyCode === 13) {

            if (!action.value) return;

            if (i === -1) {
              if (results.length === 0 || action.value !== results[0].innerText) return;
              if (results.length === 1) return action.value = results[0].innerText;
            }

            if (results[i]) {
              action.value = results[i].innerText
            }

            deselectAction();
            return i = -1;
          }
        });

    }

    async ['route'](r) {
      if (window.wof[r]) {
        window.wof[r](r)
        window.wof['blur']()
        return;
      }

      if (window.wof[r.split(' ')[0]]) {
        window.wof[r.split(' ')[0]](r)
        window.wof['blur']()
        return;
      }

      // route exists as one entity (example: "load")
      if (window.wof[r.toLowerCase()]) {
        window.wof[r.toLowerCase()](r)
        window.wof['blur']()
        return;
      }
      // route does not exist because it is two parts (example: "open <file>")
      if (window.wof[r.toLowerCase().split(' ')[0]]) {
        window.wof[r.toLowerCase().split(' ')[0]](r);
        window.wof['blur']()
        return;
      }
    }
