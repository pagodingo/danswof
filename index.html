<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./wasd.png">
  <title>wof</title>
</head>
<body>
<style>

  body {
    color: #000;
  }
.embed-html-input { width: 100%; }
.drag-bar {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 60px; height: 10px; background: #888; border-radius: 4px 4px 0 0;
  cursor: grab; z-index: 10;
}
.link-chip {
  display: inline-flex; align-items: center; flex-direction: column;
  margin: 5px; border: 1px solid #666666; color: #666666; background: #252525;
  border-radius: 3px; padding: 1px 6px; text-decoration: none; font-size: 13px;
  cursor: pointer; white-space: normal; word-break: break-word;
  user-select: none; -webkit-user-select: none;
  max-height: 108px !important; overflow-y: scroll;
}
.link-chip:hover { border: 1px solid #f47b85; }
.link-chip::before {
  content: '∅ - Qualia, or the Fourth World'; position: sticky;
  background: #252525; top: 0; width: 100%; color: #f47b85; border-bottom: 1px solid #666;
}
.handle { position: absolute; width: 10px; height: 10px; border-radius: 2px; }
.handle.nw { top: -6px; left: -6px; cursor: nwse-resize; }
.handle.ne { top: -6px; right: -6px; cursor: nesw-resize; }
.handle.sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
.handle.se { bottom: -6px; right: -6px; cursor: nwse-resize; }
#wof-alpha-canvas {
  position: relative; overflow: auto; overflow-y: scroll !important;
  bottom: 0; height: 100%; width: 100%;
}
.image-item {
  position: absolute; touch-action: none; user-select: none;
  cursor: grab; border-radius: 4px;
}
.dNote { position: absolute; }
.image-item:hover { border: 1px dashed #555; }
.image-item:hover .handle { background: #999; }
.image-item img { display: block; width: 100%; height: 100%; object-fit: contain; border-radius: 4px; }
.text-item {
  position: absolute; touch-action: none; user-select: text;
  min-width: 100px; min-height: 40px; padding: 6px 8px;
  background: #000; border: 1px dashed rgba(0,0,0,0.2); border-radius: 4px;
  cursor: grab; font-size: 16px; line-height: 1.4; white-space: pre-wrap;
  overflow: auto; resize: both;
}
.text-item:focus { outline: 2px solid #333; }
html, body {
  margin: 0; height: 100%; overflow: hidden;
  font-size: 12px; font-family: 'monospace';
}
.container { position: absolute; display: flex; flex-direction: column; height: 100%; width: 100%; bottom: 0; }
.editor { margin-bottom: auto; top: 0; }
.map-item {
  aspect-ratio: 1/1; width: auto; height: auto;
  text-align: center; vertical-align: middle;
  background-repeat: no-repeat; background-position: center;
  background-size: contain; padding: 10px;
}
.playground { overflow-y: scroll; height: 100%; bottom: 0; display: flex; }
#wof-alpha-text-box { overflow-y: scroll; width: 100%; bottom: 40px; height: 200px; min-height: 200px; background-color: #222; }
#wof-alpha-grd { overflow-y: scroll; height: 100%; width: 100%; border: 1px solid #555; resize: both; }
#wof-alpha-grid {
  overflow-y: scroll; background: #333;
  bottom: 0 !important; margin-top: auto; border-right: 1px solid #242424;
}
.main { display: flex; flex-direction: row; height: 100%; width: 100%; overflow: hidden; overflow-x: scroll; }
.left { max-width: fit-content; overflow: auto; }
.divider { width: 6px; cursor: col-resize; }
* { scrollbar-color: #888 #F0F0F0; }
.results { color: #fff; width: 100%; overflow-y: scroll; background: none; }
#wof-alpha-terminal {
  position: absolute; top: calc(50% - 250px); left: calc(50% - 250px);
  overflow-x: hidden; height: 500px; border: 1px solid #555;
  display: flex; background: #2222229e; border-radius: 5px; z-index: 88; max-width: 500px;
}
#wof-alpha-terminal-tabs { max-width: 500px !important; overflow-x: scroll; }
#wof-alpha-fileSearchBarInput, #wof-alpha-fileSearchBar {
  border: none; display: none; outline: none; width: 500px; margin: 0;
  color: #fff; background: none; padding: 5px;
}
#wof-alpha-fileSearchBar { padding: 0; width: 500px; height: 500px; }
#wof-alpha-fileSearchBarInput:focus { display: block !important; }
.results div { cursor: pointer; padding: 5px; }
.results div:hover, .result-selected { background-color: #444; }
.app {
  height: 100%; width: 100%; overflow-y: scroll; overflow-x: scroll; padding: 10px;
}
.app:active, .app:hover, .app:focus { outline: none; }
a { color: #999eee; }
#wof-alpha-textarea { box-sizing: border-box; border-radius: 0.5rem; padding: 0.5rem; width: 100%; color: #fff; }
.canvas {
  position: relative; width: 2000px !important; height: 2000px !important;
  background: #f7f8fc;
  background-image: linear-gradient(to right, #798f9f 1px, transparent 1px),
                    linear-gradient(to bottom, #798f9f 1px, transparent 1px);
  background-size: 32px 32px;
}
.image-box { position: absolute; cursor: move; user-select: none; border: 1px solid transparent; }
.image-box.selected { border: 1px dashed #4f46e5; }
.image-box img { display: block; width: 100%; height: 100%; pointer-events: none; }
.resize-handle { position: absolute; width: 10px; height: 10px; background: #4f46e5; right: -5px; bottom: -5px; cursor: nwse-resize; }
#wof-alpha-terminal-text { width: 100%; padding: 5px; }
.t-btns { display: flex; flex-direction: row; justify-content: space-evenly; overflow-x: scroll; scrollbar-width: none; }
.t-btn { background: #333; width: 100%; text-align: center; min-width: 100px; }
.t-btn:hover { background: #555; cursor: pointer; }

/* ── Mobile layout: screens narrower than 1200px ─────────────────────────── */
@media (max-width: 1199px) {
  html, body { overflow: auto; height: auto; }
  .container { position: static; height: auto; }
  .playground { overflow-y: visible; height: auto; flex-direction: column; }
  .main { flex-direction: column; height: auto; overflow: visible; overflow-x: hidden; }
  .left { max-width: 100%; overflow: visible; }
  #wof-alpha-canvas {
    position: static !important;
    width: 100% !important; height: auto !important;
    overflow: visible !important;
    display: flex; flex-direction: column; gap: 12px; padding: 12px; box-sizing: border-box;
    /* keep the dot-grid look */
    background: #f7f8fc;
    background-image: linear-gradient(to right, #798f9f 1px, transparent 1px),
                      linear-gradient(to bottom, #798f9f 1px, transparent 1px);
    background-size: 32px 32px;
  }
  /* strip absolute positioning from all widgets */
  #wof-alpha-canvas > .image-item,
  #wof-alpha-canvas > .dNote,
  #wof-alpha-canvas > .text-item {
    position: static !important;
    width: 100% !important; height: auto !important;
    min-height: 160px;
    cursor: default !important;
    touch-action: auto !important;
  }
  /* hide resize handles and drag bar — not useful on mobile */
  #wof-alpha-canvas > .image-item .handle,
  #wof-alpha-canvas > .dNote .handle,
  #wof-alpha-canvas .drag-bar { display: none; }
  /* terminal stays usable */
  #wof-alpha-terminal {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    max-width: 96vw; width: 96vw;
  }
  #wof-alpha-fileSearchBarInput, #wof-alpha-fileSearchBar { width: 100%; }
}
</style>

<div class="container">
  <div class="playground">
    <div class="main">
      <div class="left">
        <div id="wof-alpha-canvas" class="canvas"></div>
      </div>
    </div>
  </div>
  <div>
    <div id="wof-alpha-terminal" style="display:none">
      <div class="t-btns">
        <div class="t-btn">{}</div>
        <div class="t-btn">Save</div>
        <div class="t-btn">History</div>
        <div class="t-btn">Close</div>
      </div>
      <div id="wof-alpha-fileSearchBar">
        <input style="display:none" onkeyup="window.wof.main(event)" id="wof-alpha-fileSearchBarInput" autocomplete="off" spellcheck="false">
      </div>
      <div id="wof-alpha-terminal-text"></div>
    </div>
  </div>
</div>

<script>
  /*  ____
   __[____]__                      _/\_
    /^----^\                        \/ _/\_
   ( .    . )             0000  _/\_    \/
       <>                000     \/
                         000
  000  000  000  .d00b.0000000
  000  000  000 d00""00b 000
  000  000  000 000  000 000
  000..000..000 000..000 000        ____
    "0000000"    "0000"  000     __[____]__
                                  /^""""^\
                                 ( 0/  0  )
                                   <>
  */

  const state = {
    theme: {
      colorText:      window.localStorage.getItem('colorText')      || '#fdfeff',
      colorPrimary:   window.localStorage.getItem('colorPrimary')   || '#fdfeff',
      colorSecondary: window.localStorage.getItem('colorSecondary') || '#444444',
      colorContent:   window.localStorage.getItem('colorContent')   || '#222222',
      colorEmphasis:  window.localStorage.getItem('colorEmphasis')  || '#222222',
      colorAccent:    window.localStorage.getItem('colorAccent')    || 'lightgrey',
      colorRowHover:  window.localStorage.getItem('colorRowHover')  || '#7baaff'
    }
  };

  // ─── Shared z-order counter (module scope) ──────────────────────────────────
  let wofZCounter = 1;

  // ─── Mobile breakpoint check ────────────────────────────────────────────────
  function isMobile() { return window.innerWidth < 1200; }

  // ─── Re-sort canvas children by data-z so mobile scroll order = z-order ────
  function reorderMobile() {
    if (!isMobile()) return;
    const canvas = document.getElementById('wof-alpha-canvas');
    const widgets = [...canvas.children].filter(el =>
      el.classList.contains('image-item') || el.classList.contains('dNote') || el.classList.contains('text-item')
    );
    widgets
      .sort((a, b) => (parseInt(a.dataset.z) || 0) - (parseInt(b.dataset.z) || 0))
      .forEach(el => canvas.appendChild(el)); // re-append in order (moves to end)
  }

  // ─── Widget Factory ─────────────────────────────────────────────────────────
  function makeWidget({ html = '', x = 50, y = 50, w = '240px', h = '160px',
                        className = 'image-item', dragBarEnabled = false,
                        clamp = false } = {}) {

    const canvas = document.getElementById('wof-alpha-canvas');

    function clampToCanvas(item) {
      if (!clamp || isMobile()) return;
      const cr = canvas.getBoundingClientRect();
      const ir = item.getBoundingClientRect();
      let left = parseFloat(item.style.left);
      let top  = parseFloat(item.style.top);
      if (left < 0) left = 0;
      if (top  < 0) top  = 0;
      if (left + ir.width  > cr.width)  left = cr.width  - ir.width;
      if (top  + ir.height > cr.height) top  = cr.height - ir.height;
      item.style.left = left + 'px';
      item.style.top  = top  + 'px';
    }

    const item = document.createElement('div');
    item.className = className;
    item.innerHTML = html;
    item.style.left   = x + 'px';
    item.style.top    = y + 'px';
    item.style.width  = w;
    item.style.height = h;
    item.style.zIndex = ++wofZCounter;
    item.dataset.z    = wofZCounter; // ← store for mobile sort

    // Resize handles
    ['nw', 'ne', 'sw', 'se'].forEach(pos => {
      const h = document.createElement('div');
      h.className = 'handle ' + pos;
      item.appendChild(h);
    });

    canvas.appendChild(item);
    reorderMobile(); // keep scroll order in sync

    // ── Drag (full item) ─────────────────────────────────────────────────────
    if (!dragBarEnabled) {
      let startX, startY, origX, origY, dragging = false;
      item.addEventListener('pointerdown', e => {
        if (isMobile()) return; // no drag on mobile
        if (e.target.classList.contains('handle')) return;
        e.preventDefault();
        item.setPointerCapture(e.pointerId);
        dragging = true;
        startX = e.clientX; startY = e.clientY;
        origX = parseFloat(item.style.left); origY = parseFloat(item.style.top);
        item.style.zIndex = ++wofZCounter;
        item.dataset.z = wofZCounter;
        item.style.cursor = 'grabbing';
      });
      item.addEventListener('pointermove', e => {
        if (!dragging) return;
        item.style.left = (origX + e.clientX - startX) + 'px';
        item.style.top  = (origY + e.clientY - startY) + 'px';
        clampToCanvas(item);
      });
      item.addEventListener('pointerup', e => {
        dragging = false; item.style.cursor = 'grab';
        try { item.releasePointerCapture(e.pointerId); } catch {}
      });
    }

    // ── Drag bar ─────────────────────────────────────────────────────────────
    if (dragBarEnabled) {
      const bar = document.createElement('div');
      bar.className = 'drag-bar';
      item.appendChild(bar);
      let startX, startY, origX, origY, dragging = false;
      bar.addEventListener('pointerdown', e => {
        if (isMobile()) return; // no drag on mobile
        e.preventDefault();
        bar.setPointerCapture(e.pointerId);
        dragging = true;
        startX = e.clientX; startY = e.clientY;
        origX = parseFloat(item.style.left); origY = parseFloat(item.style.top);
        item.style.zIndex = ++wofZCounter;
        item.dataset.z = wofZCounter;
        bar.style.cursor = 'grabbing';
      });
      bar.addEventListener('pointermove', e => {
        if (!dragging) return;
        item.style.left = (origX + e.clientX - startX) + 'px';
        item.style.top  = (origY + e.clientY - startY) + 'px';
        clampToCanvas(item);
      });
      bar.addEventListener('pointerup', e => {
        dragging = false; bar.style.cursor = 'grab';
        try { bar.releasePointerCapture(e.pointerId); } catch {}
      });
    }

    // ── Resize handles ───────────────────────────────────────────────────────
    item.querySelectorAll('.handle').forEach(handle => {
      let startW, startH, startL, startT, sx, sy;
      handle.addEventListener('pointerdown', e => {
        if (isMobile()) return;
        e.stopPropagation(); e.preventDefault();
        item.setPointerCapture(e.pointerId);
        sx = e.clientX; sy = e.clientY;
        startW = item.offsetWidth; startH = item.offsetHeight;
        startL = parseFloat(item.style.left); startT = parseFloat(item.style.top);
        const pos = [...handle.classList].find(c => ['nw','ne','sw','se'].includes(c));
        function move(ev) {
          const dx = ev.clientX - sx, dy = ev.clientY - sy;
          if (pos === 'se') { item.style.width = (startW+dx)+'px'; item.style.height = (startH+dy)+'px'; }
          if (pos === 'sw') { item.style.width = (startW-dx)+'px'; item.style.height = (startH+dy)+'px'; item.style.left = (startL+dx)+'px'; }
          if (pos === 'ne') { item.style.width = (startW+dx)+'px'; item.style.height = (startH-dy)+'px'; item.style.top  = (startT+dy)+'px'; }
          if (pos === 'nw') { item.style.width = (startW-dx)+'px'; item.style.height = (startH-dy)+'px'; item.style.left = (startL+dx)+'px'; item.style.top = (startT+dy)+'px'; }
          clampToCanvas(item);
        }
        function up() { item.removeEventListener('pointermove', move); item.removeEventListener('pointerup', up); }
        item.addEventListener('pointermove', move);
        item.addEventListener('pointerup', up);
      });
    });

    return item;
  }

  // ─── Re-sort when viewport crosses the 1200px threshold ─────────────────────
  window.addEventListener('resize', reorderMobile);

  // ─── Image-specific factory helper ──────────────────────────────────────────
  function makeImageWidget(blobOrUrl, x = 50, y = 50) {
    const item = makeWidget({ html: '', x, y, w: '240px', h: '160px', clamp: true });
    const img = document.createElement('img');
    img.draggable = false;
    if (blobOrUrl instanceof Blob) {
      img.src = URL.createObjectURL(blobOrUrl);
      item._objectURL = img.src;
    } else {
      img.src = blobOrUrl;
    }
    item.insertBefore(img, item.firstChild);
    item.addEventListener('dblclick', () => {
      if (item._objectURL) URL.revokeObjectURL(item._objectURL);
      item.remove();
    });
    return item;
  }

  // ─── URL → base64 helper ────────────────────────────────────────────────────
  function urlContentToDataUri(url) {
    return fetch(url)
      .then(r => r.blob())
      .then(blob => new Promise(res => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result);
        reader.readAsDataURL(blob);
      }));
  }

  function render() {
    window.wof = new Wof();
    window.wof['mount']();
    window.wof['img-board']();
    window.wof['press']();
  }

  class Wof {

    ['press']() {
      var location = window.location.search;
      if (location === '') return;
      location = location.split('?press=')[1];
      window.wof['source'](`source ${location}`);
    }

    ['s-cache']() {
      window.localStorage.setItem('cache', JSON.stringify({
        canvas: document.querySelector('#wof-alpha-canvas').innerHTML,
        app: document.querySelector('.app') ? document.querySelector('.app').innerHTML : ''
      }));
    }

    ['c-cache']() {
      var cache = JSON.parse(window.localStorage.getItem('cache'));
      console.log(cache);
    }

    ['l-cache']() {
      var cache = JSON.parse(window.localStorage.getItem('cache'));
      if (cache.app && document.querySelector('.app')) document.querySelector('.app').innerHTML = cache.app;
      document.querySelector('#wof-alpha-canvas').innerHTML = cache.canvas;
    }

    ['zroid-azur']() {
      document.getElementById('wof-alpha-terminal-text').innerText =
        `search:\n       file: 'peter-starkk.mp4'\n       date: 1-12-24, 8-20-25`;
    }

    ['display-ne-canvas-w-img']() {
      const canvas = document.getElementById('wof-alpha-grid');
      if (!canvas) return;
      canvas.width = 2048;
      canvas.height = 2048;
      const ctx = canvas.getContext('2d');
      const cellSize = 16;
      const rows = canvas.height / cellSize;
      const cols = canvas.width  / cellSize;
      const imageSources = [];
      const images = [];
      let imagesLoaded = 0;
      let hoverTile = null;
      let isDragging = false;
      const gridData = Array.from({ length: rows }, () => Array(cols).fill(null));

      function loadImages(callback) {
        if (imageSources.length === 0) { callback(); return; }
        for (let src of imageSources) {
          const img = new Image();
          img.src = src;
          img.onload = () => { if (++imagesLoaded === imageSources.length) callback(); };
          images.push(img);
        }
      }
      function drawGridLines() {
        ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
        for (let x = 0; x <= cols; x++) {
          ctx.beginPath(); ctx.moveTo(x*cellSize+.5,0); ctx.lineTo(x*cellSize+.5,canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= rows; y++) {
          ctx.beginPath(); ctx.moveTo(0,y*cellSize+.5); ctx.lineTo(canvas.width,y*cellSize+.5); ctx.stroke();
        }
      }
      function redraw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) { if (gridData[r][c]) ctx.drawImage(gridData[r][c],c*cellSize,r*cellSize,cellSize,cellSize); }
        drawGridLines();
        if (hoverTile) {
          const {row,col} = hoverTile;
          if (isDragging && images.length) { gridData[row][col] = images[Math.floor(Math.random()*images.length)]; }
          ctx.save(); ctx.strokeStyle='#bbb'; ctx.lineWidth=3;
          ctx.strokeRect(col*cellSize+1.5,row*cellSize+1.5,cellSize-3,cellSize-3); ctx.restore();
        }
      }
      function getTileAtClick(event) {
        const rect = canvas.getBoundingClientRect();
        const col = Math.floor((event.clientX-rect.left)/cellSize);
        const row = Math.floor((event.clientY-rect.top)/cellSize);
        ctx.fillStyle='#fff';
        ctx.fillRect(col*cellSize+1.5,row*cellSize+1.5,cellSize-3,cellSize-3);
      }
      canvas.addEventListener('click', getTileAtClick);
      canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const col = Math.floor((e.clientX-rect.left)/cellSize);
        const row = Math.floor((e.clientY-rect.top)/cellSize);
        hoverTile = (col>=0&&col<cols&&row>=0&&row<rows) ? {row,col} : null;
      });
      canvas.addEventListener('mousedown', e => { isDragging=true; });
      canvas.addEventListener('mouseup', () => { isDragging=false; });
      loadImages(() => { drawGridLines(); redraw(); });
    }

    ['img-board']() {
      const left = document.querySelector('.left');
      const main = document.querySelector('.main');
      let isDragging = false;
      window.addEventListener('mouseup', () => { isDragging=false; document.body.style.cursor=''; });
      window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const mainRect = main.getBoundingClientRect();
        const newWidth = e.clientX - mainRect.left;
        if (newWidth > 318 && newWidth < mainRect.width - 320) left.style.flex = `0 0 ${newWidth}px`;
      });

      window.addEventListener('paste', async e => {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (let i = 0; i < items.length; i++) {
          const it = items[i];
          if (it.type.indexOf('image') === 0) {
            const imageFile = it.getAsFile();
            const reader = new FileReader();
            reader.onloadend = () => makeImageWidget(reader.result, 20, 20);
            reader.readAsDataURL(imageFile);
          } else if (it.type === 'text/plain') {
            const text = e.clipboardData.getData('text/plain').trim();
            if (text && (text.startsWith('http') || text.startsWith('data:'))) {
              const uri = await urlContentToDataUri(text);
              makeImageWidget(uri, 20, 20);
            }
          }
        }
      });

      let lastActive = null;
      document.getElementById('wof-alpha-canvas').addEventListener('click', e => {
        const item = e.target.closest('.image-item');
        if (item) {
          lastActive = item;
          item.style.outline = '2px solid rgba(11,92,255,0.18)';
          setTimeout(() => item.style.outline = '', 220);
        } else { lastActive = null; }
      });
    }

    async ['run'](route) {
      const file = route.split(' ')[1];
      const html = await window.wof['request-file'](file);
      window.open('data:text/html,' + encodeURIComponent(html), 'popup', 'width=600,height=400');
    }

    ['paste-item']() {
      makeWidget({
        html: `<div id="wof-alpha-grd"><canvas id="wof-alpha-grid"></canvas></div>`,
        x: 50, y: 50, w: '240px', h: '160px', className: 'image-item grd', clamp: true
      });
      window.wof['display-ne-canvas-w-img']();
    }

    ['#md']() {
      makeWidget({
        html: `
<style>
#wof-alpha-md-app{color:#000;border:1px solid #798f9f;background:#f7f8fc;height:100%;font-family:sans-serif;display:flex;flex-direction:column}
#wof-alpha-md-panes{display:flex;flex:1;overflow:hidden}
#wof-alpha-md-editor{flex:1;overflow-y:auto;padding:12px;font-family:monospace;font-size:14px;resize:none;border-top:none;border-left:none;border-bottom:none; border-right: 1px dotted #798f9f; outline:none}

    async ['.md']() {
      window.wof['#md']();
      const editor  = document.getElementById('wof-alpha-md-editor');
      const preview = document.getElementById('wof-alpha-md-preview');

      function md(s) {
        return s
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/^#{6} (.+)$/gm,'<h6>$1</h6>').replace(/^#{5} (.+)$/gm,'<h5>$1</h5>')
          .replace(/^#{4} (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>')
          .replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
          .replace(/^\> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^---+$/gm,'<hr>')
          .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2" style="max-width:100%">')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')
          .replace(/^(\d+)\. (.+)$/gm,'<li data-ol>$2</li>').replace(/^[-*] (.+)$/gm,'<li>$1</li>')
          .replace(/(<li data-ol>[\s\S]*?<\/li>)/g,'<ol>$1</ol>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
          .replace(/\|(.+)\|/g,row=>'<tr>'+row.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>'<td>'+c.trim()+'</td>').join('')+'</tr>')
          .replace(/(<tr>[\s\S]+<\/tr>)/g,'<table>$1</table>')
          .replace(/^(?!<[h|b|u|o|p|t|c|i])(.*\S.*)$/gm,'<p>$1</p>').replace(/\n{2,}/g,'');
      }

      function renderMd() {
        if (preview) preview.innerHTML = md(editor.innerText || editor.value || '');
      }

      function wrap(before, after) {
        const s = editor.selectionStart, e = editor.selectionEnd;
        const sel = editor.value.slice(s,e)||'text';
        editor.value = editor.value.slice(0,s)+before+sel+after+editor.value.slice(e);
        editor.focus(); editor.setSelectionRange(s+before.length,s+before.length+sel.length);
        renderMd();
      }

      editor.addEventListener('input', renderMd);
      editor.addEventListener('keydown', e => {
        if (e.key==='Tab') {
          e.preventDefault();
          const s=editor.selectionStart;
          editor.value=editor.value.slice(0,s)+'  '+editor.value.slice(s);
          editor.selectionStart=editor.selectionEnd=s+2;
        }
      });

      if (editor.tagName==='TEXTAREA') {
        editor.value = `# Welcome\n\nStart writing **markdown** here.\n\n- Live preview on the right\n- Use the toolbar or type directly\n`;
      } else {
        editor.innerText = `# Welcome\n\nStart writing **markdown** here.\n`;
      }
      renderMd();
    }

    async ['add-img-listeners']() {
      const items = [...document.querySelectorAll('.image-item'), ...document.querySelectorAll('.dNote')];
      items.forEach(item => {
        let startX,startY,origX,origY,dragging=false;
        item.addEventListener('pointerdown', e => {
          if (isMobile()) return;
          if (e.target.classList.contains('handle')) return;
          e.preventDefault();
          item.setPointerCapture(e.pointerId);
          dragging=true; startX=e.clientX; startY=e.clientY;
          origX=parseFloat(item.style.left); origY=parseFloat(item.style.top);
          item.style.zIndex = ++wofZCounter;
          item.dataset.z = wofZCounter;
          item.style.cursor='grabbing';
        });
        item.addEventListener('pointermove', e => {
          if (!dragging) return;
          item.style.left=(origX+e.clientX-startX)+'px';
          item.style.top=(origY+e.clientY-startY)+'px';
        });
        item.addEventListener('pointerup', e => {
          dragging=false; item.style.cursor='grab';
          try{item.releasePointerCapture(e.pointerId);}catch{}
        });
        item.querySelectorAll('.handle').forEach(h => {
          let startW,startH,startL,startT,sx,sy;
          h.addEventListener('pointerdown', e => {
            if (isMobile()) return;
            e.stopPropagation(); e.preventDefault();
            item.setPointerCapture(e.pointerId);
            sx=e.clientX; sy=e.clientY;
            startW=item.offsetWidth; startH=item.offsetHeight;
            startL=parseFloat(item.style.left); startT=parseFloat(item.style.top);
            const pos=[...h.classList].find(c=>['nw','ne','sw','se'].includes(c));
            function move(ev){
              const dx=ev.clientX-sx,dy=ev.clientY-sy;
              if(pos==='se'){item.style.width=(startW+dx)+'px';item.style.height=(startH+dy)+'px';}
              if(pos==='sw'){item.style.width=(startW-dx)+'px';item.style.height=(startH+dy)+'px';item.style.left=(startL+dx)+'px';}
              if(pos==='ne'){item.style.width=(startW+dx)+'px';item.style.height=(startH-dy)+'px';item.style.top=(startT+dy)+'px';}
              if(pos==='nw'){item.style.width=(startW-dx)+'px';item.style.height=(startH-dy)+'px';item.style.left=(startL+dx)+'px';item.style.top=(startT+dy)+'px';}
            }
            function up(){item.removeEventListener('pointermove',move);item.removeEventListener('pointerup',up);}
            item.addEventListener('pointermove',move); item.addEventListener('pointerup',up);
          });
        });
        item.addEventListener('dblclick', () => {
          if (item._objectURL) URL.revokeObjectURL(item._objectURL);
          item.remove();
        });
      });
    }

    ['chip']() {
      const editor = document.querySelector('.app');
      if (!editor) return;
      let chipCounter = 0;
      function makeId() { return 'chip-'+String(++chipCounter).padStart(4,'0')+'-'+Math.random().toString(36).slice(2,6); }
      function makeChip(text, id) {
        const span = document.createElement('span');
        span.className='link-chip'; span.contentEditable='false';
        span.dataset.chipId=id; span.title='ID: '+id; span.textContent=text;
        span.addEventListener('click',()=>{ confirm('Chip clicked — text: "'+text+'"  id: '+id); });
        return span;
      }
      editor.addEventListener('keydown', e => {
        if ((e.ctrlKey||e.metaKey)&&e.key==='v') {
          const sel=window.getSelection(); if(!sel||!sel.rangeCount) return;
          const range=sel.getRangeAt(0); if(range.collapsed) return;
          if(!editor.contains(range.commonAncestorContainer)) return;
          e.preventDefault();
          const selectedText=range.toString().trim(); if(!selectedText) return;
          const id=makeId(); const chip=makeChip(selectedText,id);
          range.deleteContents(); range.insertNode(chip);
          const spacer=document.createTextNode('\u200b');
          range.setStartAfter(chip); range.insertNode(spacer);
          range.setStartAfter(spacer); range.collapse(true);
          sel.removeAllRanges(); sel.addRange(range);
          const box=document.getElementById('chip-info');
          if(box) box.textContent='Created chip — text: "'+selectedText+'"  id: '+id;
          return;
        }
        if(e.key!=='Backspace'&&e.key!=='Delete') return;
        const sel=window.getSelection(); if(!sel||!sel.rangeCount) return;
        const range=sel.getRangeAt(0);
        if(!range.collapsed) {
          const frag=range.cloneContents();
          if(frag.querySelector('.link-chip')) {
            e.preventDefault();
            const walker=document.createTreeWalker(range.commonAncestorContainer,NodeFilter.SHOW_ALL);
            const toBlank=[]; let node=walker.nextNode();
            while(node){
              if(range.intersectsNode(node)&&node.nodeType===Node.TEXT_NODE&&!node.parentNode?.classList?.contains('link-chip')) toBlank.push(node);
              node=walker.nextNode();
            }
            toBlank.forEach(n=>n.textContent=''); range.collapse(true);
          }
          return;
        }
        const {startContainer,startOffset}=range;
        if(e.key==='Backspace'&&!(startOffset>0&&startContainer.nodeType===Node.TEXT_NODE)){
          const ref=startContainer.nodeType===Node.TEXT_NODE?startContainer:startContainer.childNodes[startOffset-1];
          const prev=ref?.previousSibling??ref?.parentNode?.previousSibling;
          if(prev?.classList?.contains('link-chip')){e.preventDefault();return;}
        }
        if(e.key==='Delete'&&!(startContainer.nodeType===Node.TEXT_NODE&&startOffset<startContainer.length)){
          const ref=startContainer.nodeType===Node.TEXT_NODE?startContainer:startContainer.childNodes[startOffset];
          const next=ref?.nextSibling??ref?.parentNode?.nextSibling;
          if(next?.classList?.contains('link-chip')){e.preventDefault();return;}
        }
      });
    }

    ['action-handler'](action) {
      let i=-1, results=document.getElementsByClassName('autocomplete-item');
      function deselect(){ (document.getElementsByClassName('result-selected')[0]||results[0])?.classList.remove('result-selected'); }
      function select(a){
        if(a===results[results.length]){deselect();i=0;results[i].classList.add('result-selected');return;}
        deselect(); document.getElementById('wof-alpha-fileSearchBarInput').value=a.innerText; a.classList.add('result-selected');
      }
      action.addEventListener('keydown', e => {
        if(![38,40,13].includes(e.keyCode)) return;
        if(results.length===0) return;
        if(results.length===1){action.value=results[0].innerText;select(results[0]);return;}
        if(e.keyCode===40){++i;return select(results[i]);}
        if(e.keyCode===38&&i===0){i=results.length-1;return select(results[i]);}
        if(e.keyCode===38){--i;return select(results[i]);}
        if(e.keyCode===13){
          if(!action.value) return;
          if(i===-1){if(results.length===0||action.value!==results[0].innerText)return;if(results.length===1)return action.value=results[0].innerText;}
          if(results[i]) action.value=results[i].innerText;
          deselect(); return i=-1;
        }
      });
    }

    ['actions']() { var a= Object.getOwnPropertyNames(Object.getPrototypeOf(window.wof)); console.log(a); return a; }
    ['self']() { return document.getElementById('wof-alpha-fileSearchBarInput'); }

    ['blur']() {
      document.getElementById('list') && document.getElementById('list').remove();
      document.getElementById('wof-alpha-fileSearchBarInput').value='';
      if (document.getElementById('wof-alpha-terminal-text').innerText!=='') return;
      document.getElementById('wof-alpha-fileSearchBarInput').style.display='none';
      document.getElementById('wof-alpha-fileSearchBar').style.display='none';
      document.getElementById('wof-alpha-terminal').style.display='none';
    }

    async ['route'](r) {
      const tries = [r, r.split(' ')[0], r.toLowerCase(), r.toLowerCase().split(' ')[0]];
      for (const key of tries) {
        if (window.wof[key]) { window.wof[key](r); window.wof['blur'](); return; }
      }
    }
  }

  render();
</script>
